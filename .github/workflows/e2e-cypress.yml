name: E2E Cypress

# Run the end-to-end tests when the app or the tests change.
on:
  push:
    paths:
      - 'src/**'
      - 'cypress/**'
      - 'cypress.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e-cypress.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'cypress/**'
      - 'cypress.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e-cypress.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      # The Cypress action installs deps, builds and starts the app, waits until
      # it answers, then runs `cypress run` headless.
      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          build: npm run build
          start: npm start
          wait-on: 'http://localhost:3000'
