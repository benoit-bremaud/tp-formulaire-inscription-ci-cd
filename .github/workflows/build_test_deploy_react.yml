name: Build, Test and Deploy React Application

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Allow publishing on demand from the Actions tab (and as a reliable trigger
  # when a PR merge does not emit a push event that re-runs workflows).
  # The release_type input selects the SemVer bump for the npm release.
  workflow_dispatch:
    inputs:
      release_type:
        description: 'SemVer bump for the npm release'
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

# Permissions inherited by all jobs — required for the GitHub Pages deployment chain
permissions:
  contents: read     # checkout the repository
  pages: write       # call the Pages API (configure, upload artifact, deploy)
  id-token: write    # mint OIDC tokens to authenticate the deployment origin

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build_test:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Run the same job for every Node.js version listed in the matrix below
    strategy:
      matrix:
        node-version: [20.x]

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: npm ci, build and test
        run: |
          npm ci
          npm run jsdoc
          npm run build --if-present
          npm test
      # Push the Jest coverage report to Codecov for tracking
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true   # don't fail the build if Codecov is unreachable
      # Detect GitHub Pages configuration and expose its settings as outputs for later steps
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      # Package the build/ folder into a Pages-compatible artifact consumable by the deploy job
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  # Deploy job — publishes the artifact uploaded above to the GitHub Pages environment
  deploy:
    # Only deploy on push to main; skip on pull_request events because the
    # github-pages environment protection rule rejects deploys from non-default
    # branches and we don't want PRs to override production.
    if: github.event_name == 'push'
    # Link this job to the github-pages environment so the URL is tracked and clickable in the UI
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    # Don't deploy unless build_test has succeeded
    needs: build_test

    # Download the Pages artifact and publish it on GitHub Pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Publish job — bump the version (SemVer) and publish the package to npm.
  # Runs only on push to main, after the build/test job has succeeded.
  publish:
    # Only ever publish from main — the job pushes HEAD:main, so a manual
    # dispatch from another branch must not run.
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    # Serialize publish runs so two close pushes cannot race on the version bump
    # (both computing the same next version and one failing to publish).
    concurrency:
      group: publish-npm
      cancel-in-progress: false

    # Don't publish unless build_test has succeeded
    needs: build_test

    # Allow this job to push the version-bump commit back to main
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      # setup-node with registry-url writes an .npmrc that reads NODE_AUTH_TOKEN,
      # which is what authenticates `npm publish` against the registry.
      - name: Use Node.js 20.x with the npm registry configured
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'
      - name: Build, bump version and publish to npm
        run: |
          git config user.name "benoit-bremaud"
          git config user.email "benoit.bremaud@ynov.com"
          npm ci
          npm run build-npm
          # npm version creates the bump commit AND a git tag; [skip ci] keeps the
          # push from re-triggering this workflow. RELEASE_TYPE defaults to patch
          # (a plain push to main) and is overridable via workflow_dispatch.
          npm version "$RELEASE_TYPE" -m "chore(release): %s [skip ci]"
          npm publish
          # Push the bump commit and its tag back to main so the version persists.
          git push origin HEAD:main --follow-tags
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_TYPE: ${{ github.event.inputs.release_type || 'patch' }}
